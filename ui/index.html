<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV Radio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Radio</span>
                <button id="close-btn" class="close-btn">&times;</button>
            </div>

            <div class="section">
                <div class="section-title">Proximity</div>
                <div id="prox-modes" class="prox-modes"></div>
            </div>

            <div id="staff-section" class="section hidden">
                <div class="section-title">
                    Player Management
                    <button id="refresh-btn" class="refresh-btn">&#8635;</button>
                </div>
                <div id="player-list" class="player-list"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
